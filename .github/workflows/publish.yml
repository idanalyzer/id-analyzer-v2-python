name: Publish to PyPI

# Publishes idanalyzer2 to PyPI when a version tag (v*) is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token required.
# Configure the trusted publisher on pypi.org: Owner=idanalyzer,
# Repo=id-analyzer-v2-python, Workflow=publish.yml, Environment=(blank).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
